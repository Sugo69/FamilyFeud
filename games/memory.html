<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Scout — Kindred Youth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .back-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: rgba(2,6,23,0.96); border-bottom: 1px solid rgba(0,242,255,0.15); padding: 6px 14px; display: flex; align-items: center; gap: 12px; }
        .back-nav a { color: #00f2ff; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .back-nav a:hover { opacity: 1; }
        .back-nav span { color: #333; font-size: 0.7rem; }
        body { padding-top: 34px; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-5px) rotate(-2deg)} 20%,40%,60%,80%{transform:translateX(5px) rotate(2deg)} }
        .animate-error-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes float { 0%{transform:translateY(0)} 50%{transform:translateY(-12px)} 100%{transform:translateY(0)} }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-hidden">

    <div class="back-nav">
        <a href="../index.html">← Kindred Hub</a>
        <span>|</span>
        <span style="color:#555; font-family:'Orbitron',sans-serif; font-size:0.6rem; text-transform:uppercase; letter-spacing:1px;">Scripture Scout</span>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DEFAULT PAIRS (Exodus lesson — used as fallback) ---
        const DEFAULT_PAIRS = [
            { id:'d1', cardA:'Exodus 14:13-14 — Stand Still', cardB:'The Lord will fight for you', question:'What does it mean to stand still and trust God during a hard trial?', christConnection:'Christ fights our battles when we trust Him.', icon:'🌊', iconLabel:'Red Sea' },
            { id:'d2', cardA:'Exodus 14:21 — Parting the Sea', cardB:'God can prepare a way all night', question:'How does God prepare the way for us over time — not always instantly?', christConnection:'Christ opens paths through our impossible barriers.', icon:'💨', iconLabel:'East Wind' },
            { id:'d3', cardA:'Exodus 16:4 — Manna', cardB:'Gather spiritual nourishment daily', question:'How is reading scriptures every day like gathering Manna?', christConnection:'Christ is the Bread of Life — daily nourishment from Him.', icon:'🍞', iconLabel:'Daily Bread' },
            { id:'d4', cardA:'Exodus 17:6 — Water from Rock', cardB:'Christ is the Rock of Living Water', question:'When do you feel spiritually thirsty, and where do you go?', christConnection:'Jesus is the source of living water (John 4:14).', icon:'🪨', iconLabel:'The Rock' },
            { id:'d5', cardA:'Exodus 17:11 — Sustaining Moses', cardB:'We support each other in the fight', question:'How can we "hold up the arms" of our leaders and friends today?', christConnection:'Christ strengthens us as we serve together.', icon:'🙌', iconLabel:'Sustain' },
            { id:'d6', cardA:'Exodus 12:13 — Passover Blood', cardB:'The Atonement of Jesus Christ', question:'What does the blood of the lamb teach us about the Savior?', christConnection:'The Passover lamb is a type of Jesus Christ's sacrifice.', icon:'🩸', iconLabel:'Passover' },
            { id:'d7', cardA:'Exodus 20:3 — No Other Gods', cardB:'Golden calves of today', question:'What are "golden calves" — distractions — that compete for your devotion?', christConnection:'God calls us to love Him with all our heart.', icon:'🐄', iconLabel:'Golden Calf' },
            { id:'d8', cardA:'Exodus 3:2 — Burning Bush', cardB:'God speaks through sacred moments', question:'What is something holy in your life you need to pay more attention to?', christConnection:'Christ calls us to holy ground — sacred, attentive moments with Him.', icon:'🌳', iconLabel:'Holy Ground' },
            { id:'d9', cardA:'Numbers 21:8 — Brazen Serpent', cardB:'Look to Christ and live', question:'Why is it sometimes hard to simply look to Christ when we are hurting?', christConnection:'Jesus said: as Moses lifted the serpent, so must the Son of Man be lifted up (John 3:14).', icon:'🐍', iconLabel:'Look & Live' },
            { id:'d10', cardA:'Numbers 13:30 — Caleb\'s Faith', cardB:'Ten saw giants; two saw miracles', question:'How can we choose to see our challenges through eyes of faith?', christConnection:'Faith in Christ changes what we see as possible.', icon:'🍇', iconLabel:'The Spies' },
            { id:'d11', cardA:'Exodus 25:8 — The Tabernacle', cardB:'God dwells with His people', question:'Why do we build temples today? How do you feel on temple grounds?', christConnection:'Temples are the house of the Lord — where we meet Christ.', icon:'⛺', iconLabel:'Tabernacle' },
            { id:'d12', cardA:'Exodus 34:29 — Shining Face', cardB:'Time with God transforms us', question:'How does spending time with God change who we are?', christConnection:'We become more like Christ the more time we spend with Him.', icon:'🌟', iconLabel:'Shining Face' },
        ];

        // Audio helpers
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                if (type === 'flip') { osc.frequency.value = 880; gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15); }
                else if (type === 'match') { [523,659,784].forEach((f,i) => { const o=ctx.createOscillator(); const g=ctx.createGain(); o.frequency.value=f; g.gain.setValueAtTime(0,ctx.currentTime+i*0.1); g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+i*0.1+0.05); g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.1+0.25); o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime+i*0.1); o.stop(ctx.currentTime+i*0.1+0.3); }); return; }
                else if (type === 'mismatch') { osc.type='sawtooth'; osc.frequency.value=120; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3); }
                else if (type === 'win') { [523,659,784,1046,1318].forEach((f,i)=>{ const o=ctx.createOscillator(); const g=ctx.createGain(); o.frequency.value=f; g.gain.setValueAtTime(0,ctx.currentTime+i*0.1); g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+i*0.1+0.05); g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.1+0.4); o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime+i*0.1); o.stop(ctx.currentTime+i*0.1+0.5); }); return; }
                else if (type === 'sabotage') { osc.type='sawtooth'; osc.frequency.setValueAtTime(400,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.8); gain.gain.setValueAtTime(0.4,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8); }
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.5);
            } catch(e) {}
        };

        function App() {
            const [gameState, setGameState] = useState('portal'); // portal | rules | playing | won
            const [pairsData, setPairsData] = useState(DEFAULT_PAIRS);
            const [lessonTopic, setLessonTopic] = useState('Exodus — Chronicles');
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [matched, setMatched] = useState([]);
            const [isChecking, setIsChecking] = useState(false);
            const [mismatchIdx, setMismatchIdx] = useState([]);
            const [activeCard, setActiveCard] = useState(null);
            const [isSabotaging, setIsSabotaging] = useState(false);
            const [scale, setScale] = useState(100);
            const [showAdmin, setShowAdmin] = useState(false);
            const [sabotageEvery, setSabotageEvery] = useState(3);

            // Teacher Portal state
            const [portalView, setPortalView] = useState('home'); // home | lesson | manual
            const [lessonUrl, setLessonUrl] = useState('');
            const [portalStatus, setPortalStatus] = useState('');
            const [portalLoading, setPortalLoading] = useState(false);
            const [manualPairs, setManualPairs] = useState([]);
            const retryTimerRef = useRef(null);

            // Apply saved scale
            useEffect(() => {
                const saved = localStorage.getItem('kindred_display_scale');
                if (saved && !isNaN(parseFloat(saved))) setScale(parseFloat(saved) * 100);
            }, []);

            // QR code
            useEffect(() => {
                if (activeCard?.url) {
                    setTimeout(() => {
                        const el = document.getElementById('qr-canvas');
                        if (el && window.QRious) new window.QRious({ element: el, value: activeCard.url, size: 140, background: 'white', foreground: '#0a0a20' });
                    }, 60);
                }
            }, [activeCard]);

            // Win detection
            useEffect(() => {
                if (cards.length > 0 && matched.length === cards.length / 2 && !activeCard) {
                    setGameState('won');
                }
            }, [matched, cards.length, activeCard]);

            const initGame = (pairs) => {
                const gamePairs = pairs || pairsData;
                let deck = [];
                gamePairs.forEach(p => {
                    deck.push({ ...p, uniqueId: `${p.id}-A`, face: 'A', pairId: p.id });
                    deck.push({ ...p, uniqueId: `${p.id}-B`, face: 'B', pairId: p.id });
                });
                deck = deck.sort(() => Math.random() - 0.5);
                setCards(deck); setFlipped([]); setMatched([]); setActiveCard(null);
            };

            const startGame = () => { initGame(); setGameState('rules'); };

            const handleCardClick = (idx) => {
                if (isChecking || flipped.includes(idx) || matched.includes(cards[idx].pairId)) return;
                if (flipped.length === 0) playSound('flip');
                const newFlipped = [...flipped, idx];
                setFlipped(newFlipped);
                if (newFlipped.length === 2) {
                    setIsChecking(true);
                    const c1 = cards[newFlipped[0]], c2 = cards[newFlipped[1]];
                    if (c1.pairId === c2.pairId) {
                        const isFinal = matched.length + 1 === cards.length / 2;
                        playSound(isFinal ? 'win' : 'match');
                        setTimeout(() => {
                            setMatched(prev => [...prev, c1.pairId]);
                            setFlipped([]); setIsChecking(false); setActiveCard(c1);
                        }, 500);
                    } else {
                        playSound('mismatch');
                        setMismatchIdx(newFlipped);
                        setTimeout(() => { setFlipped([]); setMismatchIdx([]); setIsChecking(false); }, 900);
                    }
                }
            };

            const handleSabotage = () => {
                playSound('sabotage'); setIsSabotaging(true); setActiveCard(null);
                setTimeout(() => { setCards(prev => [...prev].sort(() => Math.random() - 0.5)); setIsSabotaging(false); }, 1500);
            };

            const canSabotage = activeCard && matched.length > 0 && matched.length % sabotageEvery === 0 && matched.length < cards.length / 2;
            const cols = pairsData.length <= 8 ? 4 : pairsData.length <= 12 ? 6 : 6;

            // Teacher Portal — generate from lesson URL
            const generateFromLesson = async () => {
                if (retryTimerRef.current) { clearInterval(retryTimerRef.current); retryTimerRef.current = null; }
                if (!lessonUrl.trim()) { setPortalStatus('Please enter a lesson URL.'); return; }
                setPortalLoading(true);
                setPortalStatus('Running lesson pipeline… (30–45 seconds)');
                try {
                    const resp = await fetch('/api/lesson-pipeline', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: lessonUrl, gameType: 'memory' })
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error || 'Pipeline failed');
                    if (!data.pairs?.length) throw new Error('No pairs returned');
                    setPairsData(data.pairs);
                    setLessonTopic(data.topic || 'Custom Lesson');
                    setPortalStatus(`✓ Generated ${data.pairs.length} matching pairs from lesson pipeline. Ready to play!`);
                    setPortalLoading(false);
                } catch(err) {
                    setPortalLoading(false);
                    let secs = 30;
                    setPortalStatus(`⚠ ${err.message} — retrying in ${secs}s (or click Generate again)`);
                    retryTimerRef.current = setInterval(() => {
                        secs--;
                        if (secs <= 0) {
                            clearInterval(retryTimerRef.current); retryTimerRef.current = null;
                            generateFromLesson();
                        } else {
                            setPortalStatus(`⚠ ${err.message} — retrying in ${secs}s (or click Generate again)`);
                        }
                    }, 1000);
                }
            };

            // --- PORTAL VIEW ---
            if (gameState === 'portal') return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center p-4 md:p-8" style={{ transform: `scale(${scale/100})`, transformOrigin: 'top center' }}>
                    <div className="w-full max-w-3xl">
                        {/* Header */}
                        <div className="text-center mb-8 mt-4">
                            <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_0_30px_rgba(0,242,255,0.5)]">
                                Scripture Scout
                            </h1>
                            <p className="text-slate-400 font-bold tracking-widest text-sm uppercase mt-2" style={{fontFamily:'Orbitron,sans-serif'}}>Find the match. Unlock the discussion.</p>
                        </div>

                        {/* Current lesson */}
                        <div className="bg-slate-900 border border-cyan-500/30 rounded-xl p-4 mb-6 flex items-center justify-between">
                            <div>
                                <div className="text-xs font-bold tracking-widest text-cyan-500 uppercase mb-1" style={{fontFamily:'Orbitron,sans-serif'}}>Active Lesson</div>
                                <div className="text-white font-bold">{lessonTopic}</div>
                                <div className="text-slate-500 text-xs mt-1">{pairsData.length} matching pairs loaded</div>
                            </div>
                            <button onClick={startGame}
                                className="px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-black text-sm tracking-widest uppercase rounded-lg transition-all hover:scale-105 hover:shadow-[0_0_20px_rgba(0,242,255,0.5)]"
                                style={{fontFamily:'Orbitron,sans-serif'}}>
                                Play →
                            </button>
                        </div>

                        {/* Teacher Portal */}
                        <div className="bg-slate-900 border border-purple-500/30 rounded-xl p-5 mb-4">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="text-2xl">🎓</span>
                                <div>
                                    <div className="text-purple-400 font-black tracking-widest text-sm uppercase" style={{fontFamily:'Orbitron,sans-serif'}}>Teacher Portal</div>
                                    <div className="text-slate-500 text-xs">Load a lesson from churchofjesuschrist.org or build custom pairs</div>
                                </div>
                            </div>

                            {portalView === 'home' && (
                                <div className="flex gap-3 flex-wrap">
                                    <button onClick={() => setPortalView('lesson')}
                                        className="flex-1 px-4 py-3 border border-cyan-500/50 text-cyan-400 font-bold text-xs tracking-widest uppercase rounded-lg hover:bg-cyan-500/10 transition-all"
                                        style={{fontFamily:'Orbitron,sans-serif'}}>
                                        🔗 From Lesson URL
                                    </button>
                                    <button onClick={() => { setPortalView('manual'); setManualPairs(pairsData.map(p => ({...p}))); }}
                                        className="flex-1 px-4 py-3 border border-purple-500/50 text-purple-400 font-bold text-xs tracking-widest uppercase rounded-lg hover:bg-purple-500/10 transition-all"
                                        style={{fontFamily:'Orbitron,sans-serif'}}>
                                        ✏️ Edit Pairs
                                    </button>
                                    <button onClick={() => { setPairsData(DEFAULT_PAIRS); setLessonTopic('Exodus — Chronicles'); setPortalStatus('Default Exodus lesson restored.'); }}
                                        className="px-4 py-3 border border-slate-600 text-slate-400 font-bold text-xs tracking-widest uppercase rounded-lg hover:bg-slate-800 transition-all"
                                        style={{fontFamily:'Orbitron,sans-serif'}}>
                                        ↺ Default
                                    </button>
                                </div>
                            )}

                            {portalView === 'lesson' && (
                                <div>
                                    <div className="text-xs text-slate-500 mb-2" style={{fontFamily:'Orbitron,sans-serif'}}>Paste a churchofjesuschrist.org lesson URL</div>
                                    <input type="url" value={lessonUrl} onChange={e=>setLessonUrl(e.target.value)}
                                        placeholder="https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026/20"
                                        className="w-full bg-slate-950 border border-slate-600 text-white px-4 py-3 rounded-lg mb-3 text-sm focus:outline-none focus:border-cyan-500"
                                        style={{fontFamily:'Rajdhani,sans-serif'}} />
                                    <div className="flex gap-3">
                                        <button onClick={generateFromLesson} disabled={portalLoading}
                                            className="flex-1 py-3 bg-gradient-to-r from-purple-600 to-cyan-600 disabled:opacity-50 text-white font-black text-xs tracking-widest uppercase rounded-lg hover:opacity-90 transition-all"
                                            style={{fontFamily:'Orbitron,sans-serif'}}>
                                            {portalLoading ? '⏳ Generating…' : '⚡ Generate Pairs'}
                                        </button>
                                        <button onClick={()=>{setPortalView('home');setPortalStatus('');}}
                                            className="px-4 py-3 border border-slate-600 text-slate-400 text-xs font-bold uppercase rounded-lg hover:bg-slate-800"
                                            style={{fontFamily:'Orbitron,sans-serif'}}>← Back</button>
                                    </div>
                                </div>
                            )}

                            {portalView === 'manual' && (
                                <div>
                                    <div className="text-xs text-slate-500 mb-3" style={{fontFamily:'Orbitron,sans-serif'}}>Edit pairs below — changes apply immediately</div>
                                    <div className="max-h-64 overflow-y-auto space-y-2 mb-3">
                                        {manualPairs.map((p, i) => (
                                            <div key={p.id} className="bg-slate-950 border border-slate-700 rounded-lg p-3">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-2xl">{p.icon}</span>
                                                    <input value={p.cardA} onChange={e=>{const np=[...manualPairs];np[i]={...np[i],cardA:e.target.value};setManualPairs(np);}}
                                                        className="flex-1 bg-transparent border-b border-slate-600 text-white text-xs px-1 py-0.5 focus:outline-none focus:border-cyan-500"
                                                        style={{fontFamily:'Rajdhani,sans-serif'}} placeholder="Card A: scripture ref — title" />
                                                </div>
                                                <input value={p.cardB} onChange={e=>{const np=[...manualPairs];np[i]={...np[i],cardB:e.target.value};setManualPairs(np);}}
                                                    className="w-full bg-transparent border-b border-slate-600 text-slate-300 text-xs px-1 py-0.5 focus:outline-none focus:border-purple-500 mb-1"
                                                    style={{fontFamily:'Rajdhani,sans-serif'}} placeholder="Card B: key phrase or application" />
                                                <input value={p.question} onChange={e=>{const np=[...manualPairs];np[i]={...np[i],question:e.target.value};setManualPairs(np);}}
                                                    className="w-full bg-transparent border-b border-slate-700 text-slate-500 text-xs px-1 py-0.5 focus:outline-none focus:border-yellow-500"
                                                    style={{fontFamily:'Rajdhani,sans-serif'}} placeholder="Discussion question" />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={()=>{setPairsData(manualPairs);setPortalView('home');setPortalStatus(`✓ ${manualPairs.length} pairs saved.`);}}
                                            className="flex-1 py-2.5 bg-cyan-600 text-black font-black text-xs tracking-widest uppercase rounded-lg hover:bg-cyan-500"
                                            style={{fontFamily:'Orbitron,sans-serif'}}>✓ Save Pairs</button>
                                        <button onClick={()=>setPortalView('home')}
                                            className="px-4 py-2.5 border border-slate-600 text-slate-400 text-xs font-bold uppercase rounded-lg hover:bg-slate-800"
                                            style={{fontFamily:'Orbitron,sans-serif'}}>← Back</button>
                                    </div>
                                </div>
                            )}

                            {portalStatus && (
                                <div className={`mt-3 text-xs px-3 py-2 rounded-lg font-bold ${portalStatus.startsWith('Error') ? 'bg-red-900/30 text-red-400 border border-red-500/30' : portalStatus.startsWith('✓') ? 'bg-cyan-900/30 text-cyan-400 border border-cyan-500/30' : 'bg-purple-900/30 text-purple-400 border border-purple-500/30'}`}
                                    style={{fontFamily:'Orbitron,sans-serif', letterSpacing:'0.5px'}}>
                                    {portalStatus}
                                </div>
                            )}
                        </div>

                        {/* Display scale */}
                        <div className="bg-slate-900 border border-slate-700 rounded-xl p-4">
                            <div className="text-xs font-bold tracking-widest text-slate-500 uppercase mb-3" style={{fontFamily:'Orbitron,sans-serif'}}>Display Scale</div>
                            <div className="flex gap-2 flex-wrap">
                                {[['📱 Mobile',55],['📟 Tablet',75],['🖥 HD TV',100],['📺 4K',160]].map(([label,val])=>(
                                    <button key={val} onClick={()=>{setScale(val);localStorage.setItem('kindred_display_scale',(val/100).toString());}}
                                        className={`px-3 py-1.5 text-xs font-bold uppercase rounded-lg border transition-all ${scale===val?'bg-cyan-500 border-cyan-500 text-black':'border-slate-600 text-slate-400 hover:border-slate-400'}`}
                                        style={{fontFamily:'Orbitron,sans-serif'}}>{label}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- RULES VIEW ---
            if (gameState === 'rules') return (
                <div className="fixed inset-0 bg-slate-950 flex items-center justify-center p-4 z-50" style={{ transform: `scale(${scale/100})`, transformOrigin: 'center' }}>
                    <div className="max-w-2xl w-full bg-slate-900 border border-cyan-500/40 rounded-2xl shadow-[0_0_60px_rgba(0,242,255,0.1)] p-8 text-center">
                        <h2 className="text-4xl font-black italic tracking-[0.15em] text-cyan-400 mb-8" style={{fontFamily:'Orbitron,sans-serif'}}>MISSION BRIEFING</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 text-left">
                            {[['🎯','Find the Match','Flip two cards. When they match — Card A (scripture) pairs with Card B (key phrase) — a discussion question unlocks.'],
                              ['⚡','Divine Intervention','Every '+sabotageEvery+' matches you get a choice: take another free turn, or unleash Sabotage to scramble all unmatched cards.'],
                              ['🛡️','Friendly Sabotage','Sabotage shuffles the board and ruins your opponent\'s memory — but it\'s always your choice!'],
                              ['🏆','Class Wins','Find all pairs to complete the mission. The real prize: the discussion goes deep.']
                            ].map(([icon,title,desc])=>(
                                <div key={title} className="bg-slate-950/60 p-4 rounded-xl border border-slate-800 flex gap-3">
                                    <span className="text-2xl flex-shrink-0">{icon}</span>
                                    <div><div className="font-black text-slate-200 text-sm uppercase tracking-wider mb-1" style={{fontFamily:'Orbitron,sans-serif'}}>{title}</div><p className="text-slate-400 text-xs leading-relaxed">{desc}</p></div>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-3 justify-center">
                            <button onClick={() => setGameState('playing')}
                                className="px-10 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-black text-lg tracking-widest uppercase rounded-lg transition-all hover:scale-105"
                                style={{fontFamily:'Orbitron,sans-serif'}}>Deploy →</button>
                            <button onClick={() => setGameState('portal')}
                                className="px-6 py-3 border border-slate-600 text-slate-400 font-bold text-sm uppercase rounded-lg hover:bg-slate-800"
                                style={{fontFamily:'Orbitron,sans-serif'}}>← Back</button>
                        </div>
                    </div>
                </div>
            );

            // --- WON VIEW ---
            if (gameState === 'won') return (
                <div className="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center" style={{ transform: `scale(${scale/100})`, transformOrigin: 'center' }}>
                    <h2 className="text-6xl md:text-8xl font-black italic tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-cyan-400 drop-shadow-[0_0_40px_rgba(234,179,8,0.5)] mb-6" style={{fontFamily:'Orbitron,sans-serif'}}>MISSION COMPLETE!</h2>
                    <p className="text-slate-400 text-xl mb-8">{pairsData.length} pairs found — {lessonTopic}</p>
                    <div className="flex gap-4">
                        <button onClick={() => { initGame(); setGameState('playing'); }}
                            className="px-8 py-3 bg-cyan-500 text-black font-black text-sm tracking-widest uppercase rounded-lg hover:bg-cyan-400 hover:scale-105 transition-all"
                            style={{fontFamily:'Orbitron,sans-serif'}}>Play Again</button>
                        <button onClick={() => setGameState('portal')}
                            className="px-8 py-3 border border-slate-600 text-slate-400 font-bold text-sm uppercase rounded-lg hover:bg-slate-800"
                            style={{fontFamily:'Orbitron,sans-serif'}}>← Portal</button>
                    </div>
                </div>
            );

            // --- PLAYING VIEW ---
            return (
                <div className="fixed inset-0 bg-slate-950 flex flex-col" style={{ transform: `scale(${scale/100})`, transformOrigin: 'top center' }}>
                    {/* Header */}
                    <header className="flex items-center justify-between px-4 py-2 bg-slate-900 border-b border-cyan-500/20 flex-shrink-0">
                        <span className="text-slate-500 text-xs font-bold tracking-widest" style={{fontFamily:'Orbitron,sans-serif'}}>
                            {matched.length}/{pairsData.length} MATCHED
                        </span>
                        <span className="text-xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 tracking-widest" style={{fontFamily:'Orbitron,sans-serif'}}>
                            SCRIPTURE SCOUT
                        </span>
                        <button onClick={()=>setShowAdmin(!showAdmin)} className="text-slate-600 hover:text-slate-300 text-xl transition-colors">⚙️</button>
                    </header>

                    {/* Admin panel */}
                    {showAdmin && (
                        <div className="bg-slate-900 border-b border-slate-700 px-4 py-3 flex gap-4 items-center flex-shrink-0 flex-wrap">
                            <div className="flex items-center gap-2">
                                <span className="text-slate-500 text-xs" style={{fontFamily:'Orbitron,sans-serif'}}>SABOTAGE EVERY</span>
                                <input type="number" value={sabotageEvery} min="1" max="6" onChange={e=>setSabotageEvery(parseInt(e.target.value)||2)}
                                    className="w-14 bg-slate-950 border border-slate-600 text-white text-center text-sm rounded-lg px-2 py-1 focus:outline-none focus:border-cyan-500" />
                                <span className="text-slate-500 text-xs">matches</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-slate-500 text-xs" style={{fontFamily:'Orbitron,sans-serif'}}>SCALE</span>
                                <input type="range" min="50" max="150" value={scale} onChange={e=>{setScale(parseInt(e.target.value));localStorage.setItem('kindred_display_scale',(parseInt(e.target.value)/100).toString());}}
                                    className="w-24" />
                                <span className="text-cyan-400 text-xs">{scale}%</span>
                            </div>
                            <button onClick={()=>{initGame();setShowAdmin(false);}}
                                className="px-3 py-1 border border-slate-600 text-slate-400 text-xs rounded-lg hover:bg-slate-800 uppercase"
                                style={{fontFamily:'Orbitron,sans-serif'}}>↺ Restart</button>
                            <button onClick={()=>setGameState('portal')}
                                className="px-3 py-1 border border-slate-600 text-slate-400 text-xs rounded-lg hover:bg-slate-800 uppercase"
                                style={{fontFamily:'Orbitron,sans-serif'}}>← Portal</button>
                        </div>
                    )}

                    {/* Card grid */}
                    <main className={`flex-1 p-3 md:p-4 overflow-hidden flex items-center justify-center ${isSabotaging ? 'animate-error-shake' : ''}`}>
                        <div className={`grid gap-2 md:gap-3 w-full h-full max-h-[85vh] transition-all duration-500`}
                            style={{ gridTemplateColumns: `repeat(${cols}, 1fr)` }}>
                            {cards.map((card, idx) => {
                                const isFlipped = flipped.includes(idx);
                                const isMatched = matched.includes(card.pairId);
                                const isMismatch = mismatchIdx.includes(idx);
                                const isFaceA = card.face === 'A';
                                return (
                                    <div key={card.uniqueId}
                                        className={`relative perspective-1000 cursor-pointer ${isMismatch ? 'animate-error-shake' : ''}`}
                                        style={{ aspectRatio: '3/4' }}
                                        onClick={() => handleCardClick(idx)}>
                                        <div className={`w-full h-full transform-style-3d transition-transform duration-500 ${isFlipped || isMatched ? 'rotate-y-180' : ''}`}>
                                            {/* Back */}
                                            <div className={`absolute inset-0 backface-hidden rounded-xl border-2 flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900
                                                ${isMismatch ? 'border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'border-cyan-500/30 hover:border-cyan-400 hover:shadow-[0_0_15px_rgba(0,242,255,0.3)]'}`}>
                                                <span className="text-3xl md:text-5xl font-black text-cyan-500/20 select-none">?</span>
                                            </div>
                                            {/* Front */}
                                            <div className={`absolute inset-0 backface-hidden rotate-y-180 rounded-xl flex flex-col items-center justify-center p-2 text-center border-2 transition-all
                                                ${isMatched
                                                    ? 'bg-slate-900/60 border-slate-700 opacity-40'
                                                    : isFaceA
                                                        ? 'bg-gradient-to-br from-cyan-900/60 to-slate-900 border-cyan-400 shadow-[0_0_20px_rgba(0,242,255,0.3)]'
                                                        : 'bg-gradient-to-br from-purple-900/60 to-slate-900 border-purple-400 shadow-[0_0_20px_rgba(157,0,255,0.3)]'}`}>
                                                {isFaceA ? (
                                                    <div className="text-xs font-bold text-cyan-300 leading-tight px-1" style={{fontFamily:'Orbitron,sans-serif', fontSize:'clamp(0.5rem,1.2vw,0.75rem)'}}>
                                                        {card.cardA}
                                                    </div>
                                                ) : (
                                                    <>
                                                        <span className="text-3xl md:text-4xl mb-1">{card.icon}</span>
                                                        <div className="text-xs font-bold text-purple-300 leading-tight px-1" style={{fontFamily:'Rajdhani,sans-serif', fontSize:'clamp(0.5rem,1.2vw,0.75rem)'}}>
                                                            {card.cardB}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* Match modal */}
                    {activeCard && (
                        <div className="fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-lg flex items-center justify-center p-4">
                            <div className="max-w-2xl w-full bg-slate-900 border-2 border-cyan-500 rounded-2xl shadow-[0_0_60px_rgba(0,242,255,0.2)] overflow-hidden">
                                <div className="flex justify-between items-center p-5 border-b border-slate-800">
                                    <div className="flex items-center gap-3">
                                        <span className="text-4xl">{activeCard.icon}</span>
                                        <div>
                                            <div className="text-xs text-cyan-400 font-bold uppercase tracking-widest" style={{fontFamily:'Orbitron,sans-serif'}}>Match Found!</div>
                                            <div className="text-white font-black text-lg">{activeCard.iconLabel}</div>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveCard(null)} className="text-slate-400 hover:text-white bg-slate-800 p-2 rounded-full hover:bg-slate-700 text-xl">✕</button>
                                </div>
                                <div className="p-5 space-y-3">
                                    <div className="flex gap-3">
                                        <div className="flex-1 bg-cyan-900/30 border border-cyan-500/30 rounded-xl p-3">
                                            <div className="text-xs text-cyan-400 font-bold uppercase tracking-wider mb-1" style={{fontFamily:'Orbitron,sans-serif'}}>Scripture</div>
                                            <div className="text-white font-bold text-sm" style={{fontFamily:'Rajdhani,sans-serif'}}>{activeCard.cardA}</div>
                                        </div>
                                        <div className="flex-1 bg-purple-900/30 border border-purple-500/30 rounded-xl p-3">
                                            <div className="text-xs text-purple-400 font-bold uppercase tracking-wider mb-1" style={{fontFamily:'Orbitron,sans-serif'}}>Connection</div>
                                            <div className="text-white font-bold text-sm" style={{fontFamily:'Rajdhani,sans-serif'}}>{activeCard.cardB}</div>
                                        </div>
                                    </div>
                                    <div className="bg-yellow-900/20 border border-yellow-500/30 rounded-xl p-4">
                                        <div className="text-xs text-yellow-400 font-bold uppercase tracking-wider mb-2" style={{fontFamily:'Orbitron,sans-serif'}}>Class Discussion</div>
                                        <p className="text-white text-base font-bold leading-relaxed" style={{fontFamily:'Rajdhani,sans-serif'}}>{activeCard.question}</p>
                                    </div>
                                    <div className="bg-slate-800/50 rounded-xl p-3 flex items-start gap-2">
                                        <span className="text-cyan-400 text-sm">✦</span>
                                        <p className="text-slate-300 text-sm italic" style={{fontFamily:'Rajdhani,sans-serif'}}>{activeCard.christConnection}</p>
                                    </div>
                                    {activeCard.url && <div className="flex items-center gap-4 pt-1">
                                        <canvas id="qr-canvas" className="rounded-lg border border-slate-700" />
                                        <div>
                                            <div className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1" style={{fontFamily:'Orbitron,sans-serif'}}>Gospel Library</div>
                                            <a href={activeCard.url} target="_blank" className="text-cyan-400 text-xs hover:underline break-all">{activeCard.url}</a>
                                        </div>
                                    </div>}
                                    <div className="flex gap-3 pt-1">
                                        {canSabotage && (
                                            <button onClick={handleSabotage}
                                                className="flex-1 py-2.5 bg-red-600 hover:bg-red-500 text-white font-black text-sm uppercase rounded-lg transition-all tracking-widest"
                                                style={{fontFamily:'Orbitron,sans-serif'}}>
                                                💣 Sabotage!
                                            </button>
                                        )}
                                        <button onClick={() => setActiveCard(null)}
                                            className="flex-1 py-2.5 bg-cyan-500 hover:bg-cyan-400 text-black font-black text-sm uppercase rounded-lg transition-all tracking-widest"
                                            style={{fontFamily:'Orbitron,sans-serif'}}>
                                            Continue →
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
